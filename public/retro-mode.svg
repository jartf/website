<svg xmlns="http://www.w3.org/2000/svg" width="88" height="31" viewBox="0 0 88 31">
  <!-- Background -->
  <rect width="88" height="31" fill="#000080"/>

  <!-- Border effect -->
  <rect x="1" y="1" width="86" height="29" fill="none" stroke="#c0c0c0" stroke-width="1"/>

  <!-- Inner area -->
  <rect x="2" y="2" width="84" height="27" fill="#c0c0c0"/>

  <!-- Text background -->
  <rect x="4" y="4" width="80" height="23" fill="#000080"/>

  <!-- "RETRO" text -->
  <text x="44" y="13"
        font-family="monospace, 'Courier New'"
        font-size="9"
        font-weight="bold"
        fill="#00ff00"
        text-anchor="middle">RETRO</text>

  <!-- "MODE" text -->
  <text x="44" y="23"
        font-family="monospace, 'Courier New'"
        font-size="8"
        font-weight="bold"
        fill="#ffff00"
        text-anchor="middle">MODE ☆</text>

  <!-- Pixel decoration - left -->
  <rect x="6" y="6" width="2" height="2" fill="#ff0000"/>
  <rect x="6" y="22" width="2" height="2" fill="#00ffff"/>

  <!-- Pixel decoration - right -->
  <rect x="80" y="6" width="2" height="2" fill="#ff00ff"/>
  <rect x="80" y="22" width="2" height="2" fill="#ffffff"/>
</svg>
